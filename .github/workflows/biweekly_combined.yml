name: Smoove Combined Report

on:
  schedule:
    # כל שבועיים ביום ראשון בשעה 10:00 ישראל (07:00 UTC)
    # שבועות זוגיים בלבד (שבוע 2, 4, 6...)
    - cron: "0 7 * * 0"
  workflow_dispatch:

jobs:
  compare-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Check if biweekly week
        id: check_week
        run: |
          WEEK=$(date +%V)
          if (( WEEK % 2 == 0 )); then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run combined report
        if: steps.check_week.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SEMOV_API_KEY:       ${{ secrets.SEMOV_API_KEY }}
          FIXED_LIST_GENERAL:  ${{ secrets.FIXED_LIST_GENERAL }}
          FIXED_LIST_ACCESS:   ${{ secrets.FIXED_LIST_ACCESS }}
          VAR_LIST_SAFETY:     ${{ secrets.VAR_LIST_SAFETY }}
          VAR_LIST_FIRE:       ${{ secrets.VAR_LIST_FIRE }}
          VAR_LIST_HARASS:     ${{ secrets.VAR_LIST_HARASS }}
          VAR_LIST_ACCESS:     ${{ secrets.VAR_LIST_ACCESS }}
          EMAIL_SENDER:        ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:     ${{ secrets.EMAIL_RECIPIENT }}
        run: python smoove_combined.py

